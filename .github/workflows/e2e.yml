name: E2E Tests

on:
  push:
  pull_request:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase stack
        run: supabase start --exclude studio,inbucket,imgproxy,storage,edge-runtime,analytics

      - name: Write .env.local from local Supabase keys
        run: |
          ANON_KEY=$(supabase status -o env | grep '^ANON_KEY=' | cut -d= -f2-)
          SERVICE_KEY=$(supabase status -o env | grep '^SERVICE_ROLE_KEY=' | cut -d= -f2-)
          cat > .env.local << EOF
          NEXT_PUBLIC_SUPABASE_URL=http://127.0.0.1:54321
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=${ANON_KEY}
          SUPABASE_SECRET_KEY=${SERVICE_KEY}
          ACTION_TOKEN_SECRET=e2e-ci-test-secret-minimum-32-chars-x
          EMAIL_JWT_SECRET=e2e-ci-email-jwt-secret-minimum-32-chars
          CRON_SECRET=e2e-ci-cron-secret-minimum-32-chars-xx
          NEXT_PUBLIC_NOTIFICATION_TIME_SCALE=60
          E2E_TEST_MODE=false
          EOF

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run unit tests
        run: npm run test:unit

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
